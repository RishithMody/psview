name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Build must not require a real key (client is lazy-instantiated).
          GEMINI_API_KEY: ""

  audit:
    name: Dependency audit (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Informational: surface all advisories in the log.
      - name: Audit report (informational)
        run: npm audit --omit=dev || true

      # Hard gate: fail only on CRITICAL production advisories. The remaining
      # HIGH advisory (next) is only resolved by the Next.js 16 major upgrade
      # and concerns features this app does not use (image optimizer, RSC
      # streaming, middleware/i18n, CSP nonces). Tracked for a future upgrade.
      - name: Fail on critical production advisories
        run: npm audit --omit=dev --audit-level=critical
